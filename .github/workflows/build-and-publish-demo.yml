# Beasts of England — Web Export CI
# Triggers on push to master or manual dispatch.
# Builds the Godot 4 web export and deploys to Netlify.
#
# Required repo variables (Settings → Variables → Actions):
#   GODOT_VERSION  →  4.6.2
#   EXPORT_NAME    →  beasts-of-england
#
# Required repo secrets (Settings → Secrets → Actions):
#   NETLIFY_AUTH_TOKEN  →  Netlify personal access token
#   NETLIFY_SITE_ID     →  6f204921-9946-41a9-bb67-679da7423ee0

name: "Build Web Demo"

on:
  push:
    branches:
      - 'master'
  workflow_dispatch:

env:
  GODOT_VERSION: ${{ vars.GODOT_VERSION }}
  EXPORT_NAME: ${{ vars.EXPORT_NAME }}
  PROJECT_PATH: .

jobs:
  export-web:
    name: Web Export
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:${{ vars.GODOT_VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup export templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mkdir -v -p ~/.config/
          mv -v /root/.config/godot ~/.config/godot || true
          mv -v /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable \
               ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable || true

      - name: Export Web build
        run: |
          mkdir -v -p build/web
          EXPORT_DIR="$(readlink -f build)"
          cd $PROJECT_PATH
          godot --headless --verbose --export-release "Web" "$EXPORT_DIR/web/index.html"

      - name: Add Netlify headers
        run: |
          printf "/*\n  Cross-Origin-Opener-Policy: same-origin\n  Cross-Origin-Embedder-Policy: require-corp\n" > build/web/_headers

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-web
          path: build/web/
          retention-days: 90

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: build/web
          production-branch: master
          production-deploy: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
