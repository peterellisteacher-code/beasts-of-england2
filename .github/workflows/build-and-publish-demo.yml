# Beasts of England — Web Export CI
# Triggers on push to demo-version branch or manual dispatch.
# Builds the Godot 4 web export and uploads it as a downloadable artifact.
#
# Required repo variables (Settings → Variables → Actions):
#   GODOT_VERSION  →  4.6.2
#   EXPORT_NAME    →  beasts-of-england

name: "Build Web Demo"

on:
  push:
    branches:
      - 'demo-version'
  workflow_dispatch:

env:
  GODOT_VERSION: ${{ vars.GODOT_VERSION }}
  EXPORT_NAME: ${{ vars.EXPORT_NAME }}
  PROJECT_PATH: .

jobs:
  export-web:
    name: Web Export
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:${{ vars.GODOT_VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: 'demo-version'
          lfs: true

      - name: Setup export templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mkdir -v -p ~/.config/
          mv -v /root/.config/godot ~/.config/godot || true
          mv -v /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable \
               ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable || true

      - name: Export Web build
        run: |
          mkdir -v -p build/web
          EXPORT_DIR="$(readlink -f build)"
          cd $PROJECT_PATH
          godot --headless --verbose --export-release "Web" "$EXPORT_DIR/web/index.html"

      - name: Zip web build
        run: |
          cd build/web
          zip -r ../${EXPORT_NAME}-web.zip .
          echo "Build size: $(du -sh ../${EXPORT_NAME}-web.zip)"

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-web
          path: build/${{ env.EXPORT_NAME }}-web.zip
          retention-days: 90
