<!DOCTYPE html>
<html lang="en">
<head>
<title>Beasts of England — Choose your chapter</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F0E8D0;
    --paper-bright: #FAF6E8;
    --paper-dim: #E5DBBE;
    --ink: #1A1814;
    --red: #9F1A1F;
    --green: #3D6B2D;
    --desk-blue: #1F2F47;
    --shadow: rgba(26,24,20,0.18);
    --typewriter: 'Special Elite', monospace;
    --serif: 'IM Fell English', serif;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; padding: 0; }
  body {
    background: var(--desk-blue);
    color: var(--ink);
    font-family: var(--serif);
    font-size: 18px;
    line-height: 1.55;
    overflow-y: auto;
  }
  #hud-polite, #hud-assertive { position: absolute; left: -10000px; }
  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 32px 24px 48px;
  }
  header {
    background: var(--paper);
    border: 2px solid var(--ink);
    padding: 24px 32px;
    margin-bottom: 24px;
    box-shadow: 0 6px 18px var(--shadow);
  }
  header h1 {
    margin: 0;
    font-family: var(--typewriter);
    font-size: 44px;
    letter-spacing: 0.02em;
  }
  header .sub {
    font-style: italic;
    color: #4A4640;
    margin-top: 6px;
  }
  #deck-summary {
    margin-top: 12px;
    font-family: var(--typewriter);
    font-size: 14px;
    color: var(--ink);
  }
  #deck-summary .red { color: var(--red); font-weight: bold; }
  .acts {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 18px;
  }
  .act {
    background: var(--paper);
    border: 2px solid var(--ink);
    padding: 20px;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
    box-shadow: 0 4px 12px var(--shadow);
    display: flex; flex-direction: column;
    transition: transform 120ms ease, background-color 120ms ease;
  }
  .act:hover, .act:focus-visible {
    transform: translateY(-3px);
    background: var(--paper-bright);
    outline: none;
  }
  .act.locked {
    opacity: 0.55;
    cursor: not-allowed;
    pointer-events: none;
  }
  .act.completed::after {
    content: '✓';
    position: absolute;
    margin: 0 0 0 0.5rem;
    color: var(--green);
  }
  .act-num {
    font-family: var(--typewriter);
    font-size: 14px;
    color: var(--red);
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }
  .act h2 {
    margin: 0 0 8px;
    font-family: var(--typewriter);
    font-size: 22px;
  }
  .act p {
    margin: 0;
    font-size: 14px;
    color: #4A4640;
    flex: 1;
  }
  .act .meta {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px dashed var(--ink);
    font-family: var(--typewriter);
    font-size: 12px;
    color: var(--ink);
    display: flex;
    justify-content: space-between;
  }
  .act .meta .reward { color: var(--green); }
  .act-l5 {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--red);
  }
  .act-l5 h2, .act-l5 .act-num { color: var(--red); }
  .act-l5 p, .act-l5 .meta { color: var(--paper-dim); }
  .act-l5:hover, .act-l5:focus-visible { background: #2A2620; }
  footer {
    margin-top: 32px;
    background: var(--paper);
    border: 2px solid var(--ink);
    padding: 16px 24px;
    font-family: var(--typewriter);
    font-size: 13px;
    color: #4A4640;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .ghost-button {
    font-family: var(--typewriter);
    font-size: 13px;
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--ink);
    padding: 6px 12px;
    cursor: pointer;
  }
  .ghost-button:hover { background: var(--ink); color: var(--paper); }
  :focus-visible { outline: 3px solid var(--red); outline-offset: 2px; }
</style>
</head>
<body>
<div id="hud-polite" aria-live="polite"></div>
<div id="hud-assertive" aria-live="assertive"></div>

<main>
  <header>
    <h1>Beasts of England</h1>
    <div class="sub">A five-act passage through the first five chapters of <em>Animal Farm</em>.</div>
    <div id="deck-summary">Deck: <span id="card-count">0</span> cards collected — to be played in <span class="red">Act V</span>.</div>
  </header>

  <section class="acts" id="acts-grid">
    <!-- Acts injected by script -->
  </section>

  <footer>
    <span>Beasts of England — Year 10 English / SACE Stage 1 prep</span>
    <button type="button" class="ghost-button" id="reset-progress">Reset progress</button>
  </footer>
</main>

<script>
const ACTS = [
  {
    n: 1, file: '../level1/index.html',
    chapter: 'Chapter II',
    title: 'The Rebellion',
    blurb: 'Run through Manor Farm at the moment of the Rebellion. Drive Mr. Jones off the property. Pick up the principles that fall from the banner.',
    reward: '+ Animalist Principles',
    loop: 'side-scrolling runner',
    minutes: '3–5'
  },
  {
    n: 2, file: '../level2/index.html',
    chapter: 'Chapter III',
    title: 'The Milk and the Apples',
    blurb: 'Squealer addresses the animals. Spot the rhetorical moves before he finishes the sentence.',
    reward: '+ Rhetoric Counters',
    loop: 'rhetoric-spotter dialogue',
    minutes: '5–7'
  },
  {
    n: 3, file: '../level3/index.html',
    chapter: 'Chapter IV',
    title: 'The Battle of the Cowshed',
    blurb: 'Pigeons and geese harass. The animals retreat. Then the ambush. Three waves. Hold the cowshed.',
    reward: '+ Tactical Insights',
    loop: 'three-wave beat-em-up',
    minutes: '6–8'
  },
  {
    n: 4, file: '../level4/index.html',
    chapter: 'Chapter V',
    title: 'The Windmill and the Mare',
    blurb: 'Snowball draws plans on the floor of the harness-room. Mollie has hidden something in her stall. Investigate both.',
    reward: '+ Suspicions',
    loop: 'dual-track puzzle',
    minutes: '5–7'
  },
  {
    n: 5, file: '../level5/index.html',
    chapter: 'Chapter V',
    title: 'The Sunday Meeting',
    blurb: 'Snowball makes the case for the windmill. Napoleon is silent. The dogs are coming. Play your deck against what unfolds.',
    reward: '— uses your deck —',
    loop: 'rhetorical deckbuilder',
    minutes: '8–12',
    final: true
  }
];

function getCompletedLevels() {
  return JSON.parse(localStorage.getItem('completedLevels') || '[]');
}
function getDeck() {
  return JSON.parse(localStorage.getItem('animalDeck') || '[]');
}

function isUnlocked(actNum) {
  if (actNum === 1) return true;
  // L2-L4 unlock when prior is complete
  if (actNum <= 4) return getCompletedLevels().includes(actNum - 1);
  // L5 unlocks when all of L1-L4 complete
  return [1,2,3,4].every(n => getCompletedLevels().includes(n));
}

function render() {
  const grid = document.getElementById('acts-grid');
  const completed = getCompletedLevels();
  const deck = getDeck();
  document.getElementById('card-count').textContent = deck.length;

  grid.innerHTML = '';
  ACTS.forEach(a => {
    const unlocked = isUnlocked(a.n);
    const done = completed.includes(a.n);
    const el = document.createElement('a');
    el.className = `act ${done ? 'completed' : ''} ${unlocked ? '' : 'locked'} ${a.final ? 'act-l5' : ''}`;
    el.href = unlocked ? a.file : '#';
    if (!unlocked) el.setAttribute('aria-disabled', 'true');
    el.innerHTML = `
      <div class="act-num">ACT ${['', 'I', 'II', 'III', 'IV', 'V'][a.n]} — ${a.chapter}</div>
      <h2>${a.title}${done ? ' ✓' : ''}</h2>
      <p>${a.blurb}</p>
      <div class="meta">
        <span>${a.loop} · ${a.minutes} min</span>
        <span class="reward">${a.reward}</span>
      </div>
      ${!unlocked ? '<div style="margin-top:8px;font-style:italic;color:#7D7872;">Complete the previous act to unlock.</div>' : ''}
    `;
    grid.appendChild(el);
  });
}

document.getElementById('reset-progress').addEventListener('click', () => {
  if (!confirm('Clear progress and deck? This will reset all completed acts and discard your collected cards.')) return;
  localStorage.removeItem('completedLevels');
  localStorage.removeItem('animalDeck');
  render();
});

render();
</script>
</body>
</html>
